name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: 'false'

      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Resolve APK name
        id: apk
        shell: bash
        run: |
          apk_path="$(find app/build/outputs/apk/debug -name '*.apk' -print -quit)"

          if [[ -z "$apk_path" ]]; then
            echo "No APK was generated." >&2
            exit 1
          fi

          apk_name="$(basename "$apk_path" .apk)"
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
