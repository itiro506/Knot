name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          sdkmanager_path="$(command -v sdkmanager || true)"

          if [[ -z "${sdkmanager_path}" ]]; then
            shopt -s nullglob
            sdkmanagers=(
              "${sdk_root}"/cmdline-tools/latest/bin/sdkmanager
              "${sdk_root}"/cmdline-tools/*/bin/sdkmanager
              "${sdk_root}"/tools/bin/sdkmanager
            )
            shopt -u nullglob

            for candidate in "${sdkmanagers[@]}"; do
              if [[ -x "${candidate}" ]]; then
                sdkmanager_path="${candidate}"
                break
              fi
            done
          fi

          if [[ -z "${sdkmanager_path}" || ! -x "${sdkmanager_path}" ]]; then
            echo "sdkmanager not found under ${sdk_root}" >&2
            exit 1
          fi

          echo "ANDROID_HOME=${sdk_root}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${sdk_root}" >> "${GITHUB_ENV}"
          echo "${sdk_root}/platform-tools" >> "${GITHUB_PATH}"

          run_sdkmanager_with_yes() {
            local status

            set +e
            set +o pipefail
            yes | "${sdkmanager_path}" "$@"
            status="${PIPESTATUS[1]}"
            set -e
            set -o pipefail

            return "${status}"
          }

          run_sdkmanager_with_yes --licenses >/dev/null
          run_sdkmanager_with_yes --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Validate Gradle wrapper
        run: |
          chmod +x ./gradlew
          test -f gradle/wrapper/gradle-wrapper.jar
          ./gradlew --version

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Prepare APK artifact
        id: apk-artifact
        shell: bash
        run: |
          set -euo pipefail

          timestamp="$(TZ=Asia/Tokyo date +'%Y%m%d-%H%M%S')"
          app_name="$(sed -n 's/.*<string name="app_name">\([^<]*\)<\/string>.*/\1/p' app/src/main/res/values/strings.xml | head -n 1)"
          version_name="$(sed -n 's/^[[:space:]]*versionName[[:space:]]*["'\'']\([^"'\'']*\)["'\''].*/\1/p' app/build.gradle | head -n 1)"

          if [[ -z "${app_name}" ]]; then
            echo "Failed to read app_name from app/src/main/res/values/strings.xml" >&2
            exit 1
          fi

          if [[ -z "${version_name}" ]]; then
            echo "Failed to read versionName from app/build.gradle" >&2
            exit 1
          fi

          shopt -s nullglob
          apks=(app/build/outputs/apk/debug/*.apk)
          if (( ${#apks[@]} != 1 )); then
            echo "Expected exactly one debug APK, found ${#apks[@]}" >&2
            exit 1
          fi

          artifact_name="${timestamp}-${app_name}-${version_name}"
          artifact_dir="app/build/outputs/apk/artifacts"
          artifact_path="${artifact_dir}/${artifact_name}.apk"

          mkdir -p "${artifact_dir}"
          cp "${apks[0]}" "${artifact_path}"

          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"
          echo "artifact_path=${artifact_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.apk-artifact.outputs.artifact_name }}
          path: ${{ steps.apk-artifact.outputs.artifact_path }}
          if-no-files-found: error
